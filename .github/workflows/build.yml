name: Flutter Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Create Complete Fresh App
        run: |
          # পুরোনো ফাইল থাকলে ডিলিট করে দেবে যেন ঝামেলা না হয়
          rm -rf * .github 2>/dev/null || true
          
          # গিটহাব নিজে থেকে একটি সচল ডেমো অ্যাপ তৈরি করবে
          flutter create --project-name=cyber_elite_panel --platforms=android .

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: cyber-elite-panel-app
          path: build/app/outputs/flutter-apk/app-release.apk
